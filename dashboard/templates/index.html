<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sensor Ecology — Dashboard</title>
  <meta name="description" content="Live perceptual dashboard for the distributed sensor ecology — field view, event stream, and motif resonance." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
  <link rel="stylesheet" href="/static/ecology.css" />
</head>
<body>

<div id="app">

  <!-- ── TOP BAR ─────────────────────────────────────────────────────────── -->
  <div id="topbar">
    <div class="logo">
      <div class="pulse-dot" id="pulse-dot"></div>
      SENSOR ECOLOGY
    </div>

    <div id="nav">
      <button class="nav-btn active" id="btn-field"     onclick="switchView('field')">Field</button>
      <button class="nav-btn"        id="btn-stream"    onclick="switchView('stream')">Stream</button>
      <button class="nav-btn"        id="btn-resonance" onclick="switchView('resonance')">Resonance</button>
    </div>

    <div id="vitals">
      <div class="vital">
        <span class="vital-label">CPU</span>
        <span class="vital-val" id="v-cpu">—</span>
      </div>
      <div class="vital">
        <span class="vital-label">Temp</span>
        <span class="vital-val" id="v-temp">—</span>
      </div>
      <div class="vital">
        <span class="vital-label">Power</span>
        <span class="vital-val" id="v-power">—</span>
      </div>
      <div style="width:1px;height:20px;background:var(--border);margin:0 4px"></div>
      <div class="vital">
        <span class="vital-label">Events/hr</span>
        <span class="vital-val" id="v-rate">—</span>
      </div>
      <div class="vital">
        <span class="vital-label">Total</span>
        <span class="vital-val" id="v-total">—</span>
      </div>
    </div>

    <div id="event-rate" style="margin-left:4px;font-size:10px;color:var(--text-dim)" id="last-updated"></div>
  </div>

  <!-- ── VIEWS ──────────────────────────────────────────────────────────── -->
  <div id="views">

    <!-- ╔══ FIELD VIEW — domain ring canvas + latest reading per domain ══╗ -->
    <div class="view active" id="view-field">
      <canvas id="field-canvas"></canvas>
      <div id="field-overlay">

        <!-- domain filter chips -->
        <div id="domain-rings-legend"></div>

        <!-- centre text: semantic summary -->
        <div id="field-center-text">
          <div id="field-agent"></div>
          <div id="field-summary"></div>
          <div id="field-motif"></div>
        </div>

        <!-- bottom stats row -->
        <div id="field-bottom">
          <div class="field-stat">
            <div class="field-stat-label">Events today</div>
            <div class="field-stat-val" id="fs-today">—</div>
            <div class="field-stat-sub" id="fs-last-hour">— last hour</div>
          </div>
          <div class="field-stat" style="text-align:center">
            <div class="field-stat-label">Last 5 min</div>
            <div class="field-stat-val" id="fs-5min">—</div>
          </div>
          <div class="field-stat" style="text-align:right">
            <div class="field-stat-label">Motif</div>
            <div class="field-stat-val" style="font-size:13px;font-weight:400;font-family:var(--font)" id="fs-motif">—</div>
            <div class="field-stat-sub" id="fs-motif-age"></div>
          </div>
        </div>

      </div>
    </div>

    <!-- ╔══ STREAM VIEW — live perceptual event feed ═══════════════════╗ -->
    <div class="view" id="view-stream">
      <div id="stream-header">
        <input id="stream-filter" type="text" placeholder="Filter by label, domain, or node…" oninput="filterStream()" />
        <button class="filter-chip active" id="chip-all"  onclick="setDomainFilter(null)">All</button>
        <button class="filter-chip" id="chip-env"  onclick="setDomainFilter('env')">env</button>
        <button class="filter-chip" id="chip-emb"  onclick="setDomainFilter('emb')">emb</button>
        <button class="filter-chip" id="chip-rel"  onclick="setDomainFilter('rel')">rel</button>
        <button class="filter-chip" id="chip-hi"   onclick="setDomainFilter('hi')">hi</button>
        <button class="filter-chip" id="chip-bme"  onclick="setDomainFilter('bme')">bme</button>
        <span style="margin-left:auto;font-size:10px;color:var(--text-dim)" id="stream-count"></span>
      </div>
      <div id="stream-feed"></div>
    </div>

    <!-- ╔══ RESONANCE VIEW — motif list + canvas echo map ══════════════╗ -->
    <div class="view" id="view-resonance">
      <div id="motif-list">
        <div style="padding:10px 16px;font-size:9px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-dim)">
          Active Motifs
        </div>
        <div id="motif-cards">
          <div class="empty-state" style="padding:20px">Loading…</div>
        </div>
      </div>

      <div id="resonance-canvas-wrap">
        <canvas id="resonance-canvas"></canvas>
        <div id="echo-panel">
          <div id="echo-title">Echoes</div>
          <div id="echo-list"></div>
        </div>
      </div>
    </div>

  </div><!-- /views -->
</div><!-- /app -->

<div id="toast"></div>

<script>

// ── Domain metadata ──────────────────────────────────────────────────────────
const DOMAINS = {
  env: { color: '#4f9cf9', label: 'Environmental' },
  emb: { color: '#f59f47', label: 'Embodied' },
  rel: { color: '#f05b5b', label: 'Relational' },
  hi:  { color: '#a78bfa', label: 'Higher-order' },
  bme: { color: '#38d9a9', label: 'BME280' },
};

function domainColor(d) {
  return DOMAINS[d]?.color || '#8896b3';
}

// ── View switching ────────────────────────────────────────────────────────────
let currentView = 'field';

function switchView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  document.getElementById('btn-' + v).classList.add('active');
  currentView = v;
  if (v === 'resonance') loadMotifs();
  if (v === 'stream')    ensureStreamStarted();
  if (v === 'field')     resizeFieldCanvas();
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let _toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ── TIME FORMAT ───────────────────────────────────────────────────────────────
function fmtAge(isoStr) {
  if (!isoStr) return '—';
  const diff = Date.now() - new Date(isoStr).getTime();
  const s = Math.floor(diff / 1000);
  if (s < 60)  return s + 's ago';
  const m = Math.floor(s / 60);
  if (m < 60)  return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24)  return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}

function fmtTime(isoStr) {
  if (!isoStr) return '—';
  const d = new Date(isoStr);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}


// ════════════════════════════════════════════════════════════════════════════
// FIELD VIEW
// ════════════════════════════════════════════════════════════════════════════

let ecologyState = null;
let fieldAnimFrame = null;
let fieldParticles = [];
let fieldRings = [];
let hiddenDomains = new Set();

function resizeFieldCanvas() {
  const cvs = document.getElementById('field-canvas');
  cvs.width  = cvs.offsetWidth;
  cvs.height = cvs.offsetHeight;
  buildFieldRings();
}

function buildFieldRings() {
  if (!ecologyState) return;
  const cvs = document.getElementById('field-canvas');
  const cx = cvs.width / 2, cy = cvs.height / 2;
  const base = Math.min(cx, cy) * 0.55;

  const domains = Object.keys(DOMAINS);
  fieldRings = domains.map((d, i) => {
    const r = base * (1 - i * 0.13);
    const latest = ecologyState.domain_latest.find(x => x.domain === d);
    return { domain: d, r, cx, cy, color: domainColor(d), latest, angle: 0 };
  });
}

function spawnParticle(domain, cx, cy, r) {
  const angle = Math.random() * Math.PI * 2;
  const speed = 0.3 + Math.random() * 0.5;
  fieldParticles.push({
    x: cx + Math.cos(angle) * r,
    y: cy + Math.sin(angle) * r,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    life: 1,
    color: domainColor(domain),
    size: 1.5 + Math.random() * 2,
  });
  if (fieldParticles.length > 120) fieldParticles.shift();
}

function drawField() {
  const cvs = document.getElementById('field-canvas');
  if (!cvs) return;
  const ctx = cvs.getContext('2d');
  ctx.clearRect(0, 0, cvs.width, cvs.height);

  if (!ecologyState) {
    fieldAnimFrame = requestAnimationFrame(drawField);
    return;
  }

  const cx = cvs.width / 2, cy = cvs.height / 2;

  // draw rings
  for (const ring of fieldRings) {
    if (hiddenDomains.has(ring.domain)) continue;
    ring.angle += 0.002;

    const alpha = ring.latest ? 0.18 : 0.06;
    ctx.beginPath();
    ctx.arc(ring.cx, ring.cy, ring.r, 0, Math.PI * 2);
    ctx.strokeStyle = ring.color;
    ctx.globalAlpha = alpha;
    ctx.lineWidth = 1;
    ctx.stroke();

    // glow on active domains
    if (ring.latest) {
      ctx.beginPath();
      ctx.arc(ring.cx, ring.cy, ring.r, 0, Math.PI * 2);
      ctx.strokeStyle = ring.color;
      ctx.globalAlpha = 0.06;
      ctx.lineWidth = 8;
      ctx.stroke();

      // rotating domain dot
      const dx = ring.cx + Math.cos(ring.angle) * ring.r;
      const dy = ring.cy + Math.sin(ring.angle) * ring.r;
      ctx.beginPath();
      ctx.arc(dx, dy, 4, 0, Math.PI * 2);
      ctx.fillStyle = ring.color;
      ctx.globalAlpha = 0.9;
      ctx.fill();
    }
  }

  // centre glow
  ctx.globalAlpha = 1;
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 80);
  grad.addColorStop(0, 'rgba(79,156,249,0.08)');
  grad.addColorStop(1, 'rgba(79,156,249,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(cx, cy, 80, 0, Math.PI * 2);
  ctx.fill();

  // update + draw particles
  ctx.globalAlpha = 1;
  for (let i = fieldParticles.length - 1; i >= 0; i--) {
    const p = fieldParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.97;
    p.vy *= 0.97;
    p.life -= 0.015;
    if (p.life <= 0) { fieldParticles.splice(i, 1); continue; }
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life * 0.7;
    ctx.fill();
  }

  ctx.globalAlpha = 1;
  fieldAnimFrame = requestAnimationFrame(drawField);
}

async function loadFieldState() {
  try {
    const state = await apiFetch('/api/stats/ecology');
    ecologyState = state;
    buildFieldRings();
    updateFieldUI(state);

    // Spawn particles for each active domain
    const cvs = document.getElementById('field-canvas');
    const cx = cvs.width / 2, cy = cvs.height / 2;
    for (const ring of fieldRings) {
      if (ring.latest) spawnParticle(ring.domain, cx, cy, ring.r);
    }
  } catch (e) {
    console.warn('ecology state:', e.message);
  }
}

function updateFieldUI(state) {
  // vitals
  const v = state.vitals;
  if (v) {
    const temp = v.agent_temp_c?.toFixed(1);
    const el = document.getElementById('v-temp');
    el.textContent = temp ? temp + '°C' : '—';
    el.className = 'vital-val' + (temp > 70 ? ' hot' : temp > 55 ? ' warm' : '');
    document.getElementById('v-cpu').textContent =
      v.agent_cpu_load_pct != null ? v.agent_cpu_load_pct.toFixed(0) + '%' : '—';
    document.getElementById('v-power').textContent =
      v.agent_power_mw != null ? (v.agent_power_mw / 1000).toFixed(1) + 'W' : '—';
  }

  // totals
  if (state.totals) {
    document.getElementById('v-rate').textContent   = state.totals.last_hour ?? '—';
    document.getElementById('v-total').textContent  = state.totals.today ?? '—';
    document.getElementById('fs-today').textContent = state.totals.today ?? '—';
    document.getElementById('fs-last-hour').textContent = (state.totals.last_hour ?? '—') + ' last hour';
    document.getElementById('fs-5min').textContent  = state.totals.last_5min ?? '—';
  }

  // latest resonance
  const lr = state.latest_resonance;
  if (lr) {
    document.getElementById('fs-motif').textContent    = lr.label ? lr.label.slice(0, 40) : '—';
    document.getElementById('fs-motif-age').textContent = fmtAge(lr.observed_at);
  }

  // domain legend chips
  const legend = document.getElementById('domain-rings-legend');
  legend.innerHTML = Object.entries(DOMAINS).map(([key, meta]) => {
    const latest = state.domain_latest.find(x => x.domain === key);
    const hidden = hiddenDomains.has(key);
    return `
      <div class="domain-chip ${hidden ? 'dim' : ''}" style="border-color:${meta.color}22"
           id="chip-domain-${key}" onclick="toggleDomain('${key}')">
        <div class="dot" style="background:${meta.color}${latest ? 'ff' : '44'}"></div>
        <span style="color:${latest ? 'var(--text)' : 'var(--text-dim)'}">${key}</span>
        ${latest ? `<span class="count">${fmtAge(latest.event_start)}</span>` : ''}
      </div>`;
  }).join('');

  // centre text: pick most recent domain summary
  const sorted = [...state.domain_latest].sort((a, b) =>
    new Date(b.event_start) - new Date(a.event_start));
  if (sorted.length) {
    const top = sorted[0];
    const summaryEl = document.getElementById('field-summary');
    summaryEl.textContent = top.event_label?.replace(/_/g, ' ') || '';
    summaryEl.classList.add('visible');
    document.getElementById('field-agent').textContent = top.domain?.toUpperCase() + ' · ' + fmtAge(top.event_start);
    const motifEl = document.getElementById('field-motif');
    motifEl.textContent = lr?.label || '';
    motifEl.classList.toggle('visible', !!lr?.label);
  }

  // pulse dot
  const active = state.domain_latest.some(x =>
    new Date(x.event_start) > Date.now() - 300_000);
  const dot = document.getElementById('pulse-dot');
  dot.classList.toggle('dim', !active);
}

function toggleDomain(key) {
  if (hiddenDomains.has(key)) hiddenDomains.delete(key);
  else hiddenDomains.add(key);
  const chip = document.getElementById('chip-domain-' + key);
  chip?.classList.toggle('dim');
}


// ════════════════════════════════════════════════════════════════════════════
// STREAM VIEW
// ════════════════════════════════════════════════════════════════════════════

let streamStarted = false;
let streamDomainFilter = null;
let streamEvents = [];
const MAX_STREAM = 200;

function ensureStreamStarted() {
  if (streamStarted) return;
  streamStarted = true;
  loadStreamBatch();
  setInterval(loadStreamBatch, 4000);
}

async function loadStreamBatch() {
  try {
    const domain = streamDomainFilter ? `&domain=${streamDomainFilter}` : '';
    const events = await apiFetch(`/api/stats/events?limit=30${domain}`);
    if (!events.length) return;

    // deduplicate by id
    const existingIds = new Set(streamEvents.map(e => e.id));
    const newEvents = events.filter(e => !existingIds.has(e.id));
    if (!newEvents.length) return;

    streamEvents = [...newEvents, ...streamEvents].slice(0, MAX_STREAM);
    document.getElementById('stream-count').textContent = streamEvents.length + ' events';
    renderStream();
  } catch (e) {
    console.warn('stream:', e.message);
  }
}

function setDomainFilter(domain) {
  streamDomainFilter = domain;
  document.querySelectorAll('#stream-header .filter-chip').forEach(el => el.classList.remove('active'));
  const chipId = domain ? 'chip-' + domain : 'chip-all';
  document.getElementById(chipId)?.classList.add('active');
  streamEvents = [];
  loadStreamBatch();
}

function filterStream() {
  renderStream();
}

function renderStream() {
  const query = document.getElementById('stream-filter').value.toLowerCase();
  const feed = document.getElementById('stream-feed');

  const filtered = query
    ? streamEvents.filter(e =>
        e.event_label?.toLowerCase().includes(query) ||
        e.domain?.toLowerCase().includes(query) ||
        e.node_name?.toLowerCase().includes(query) ||
        e.nearest_motif_label?.toLowerCase().includes(query))
    : streamEvents;

  feed.innerHTML = filtered.map(e => {
    const color = domainColor(e.domain);
    const conf = e.confidence || 'low';
    const confColor = conf === 'high' ? '#38d9a9' : conf === 'moderate' ? '#f59f47' : '#8896b3';
    const hasCross = e.is_cross_domain && e.domains_involved?.length > 1;

    return `
      <div class="event-card" id="ec-${e.id}" onclick="toggleExpand('${e.id}')">
        <div class="event-domain-bar" style="background:${color}"></div>
        <div class="event-body">
          <div class="event-header-row">
            <span class="event-agent">${e.node_name || '—'}</span>
            <span class="event-label">${e.domain}</span>
            <span class="event-confidence" style="color:${confColor};border-color:${confColor}40">${conf}</span>
            ${hasCross ? `<span class="event-confidence" style="color:#a78bfa;border-color:#a78bfa40">cross-domain</span>` : ''}
          </div>
          <div class="event-summary${conf === 'high' ? ' rich' : ''}">
            ${e.event_label?.replace(/_/g, ' ') || '—'}
          </div>
          ${e.nearest_motif_label
            ? `<div class="event-motif">∿ ${e.nearest_motif_label}</div>` : ''}
          <div class="event-expand">
            <div class="feature-snapshot" id="fs-${e.id}"></div>
          </div>
        </div>
        <div class="event-time">${fmtAge(e.event_start)}</div>
      </div>`;
  }).join('');
}

function toggleExpand(id) {
  const card = document.getElementById('ec-' + id);
  if (!card) return;
  const expanded = card.classList.toggle('expanded');
  if (expanded) {
    const e = streamEvents.find(x => x.id === id);
    const snap = document.getElementById('fs-' + id);
    if (snap && e?.feature_snapshot) {
      try {
        snap.textContent = JSON.stringify(e.feature_snapshot, null, 2);
      } catch { snap.textContent = String(e.feature_snapshot); }
    }
  }
}


// ════════════════════════════════════════════════════════════════════════════
// RESONANCE VIEW
// ════════════════════════════════════════════════════════════════════════════

let motifs = [];
let selectedMotif = null;
let resonanceParticles = [];
let resonanceAnimFrame = null;

async function loadMotifs() {
  try {
    const data = await apiFetch('/api/motifs/active?limit=40');
    motifs = data;
    renderMotifList();
    startResonanceCanvas();
  } catch (e) {
    document.getElementById('motif-cards').innerHTML =
      `<div class="empty-state">⚠ ${e.message}</div>`;
  }
}

function renderMotifList() {
  if (!motifs.length) {
    document.getElementById('motif-cards').innerHTML =
      '<div class="empty-state">No motifs with resonance yet.</div>';
    return;
  }

  const maxEchoes = Math.max(...motifs.map(m => m.resonance_count));

  document.getElementById('motif-cards').innerHTML = motifs.map(m => {
    const color = domainColor(m.dominant_domain);
    const pct = maxEchoes > 0 ? (m.resonance_count / maxEchoes * 100).toFixed(0) : 0;
    const isActive = selectedMotif?.id === m.id;
    return `
      <div class="motif-card ${isActive ? 'active' : ''}" id="mc-${m.id}"
           style="${isActive ? 'border-left-color:' + color : ''}"
           onclick="selectMotif('${m.id}')">
        <div class="motif-label">${m.label}</div>
        <div class="motif-meta">
          <div class="motif-domain-dot" style="background:${color}"></div>
          <span class="motif-count">${m.resonance_count} echo${m.resonance_count !== 1 ? 's' : ''}</span>
          <span class="motif-age">${fmtAge(m.last_resonance)}</span>
        </div>
        <div class="motif-bar-wrap">
          <div class="motif-bar" style="width:${pct}%;background:${color}"></div>
        </div>
      </div>`;
  }).join('');
}

async function selectMotif(id) {
  selectedMotif = motifs.find(m => m.id === id) || null;
  renderMotifList();

  const panel = document.getElementById('echo-panel');
  const echoList = document.getElementById('echo-list');

  if (!selectedMotif) {
    panel.classList.remove('open');
    return;
  }

  panel.classList.add('open');
  document.getElementById('echo-title').textContent = selectedMotif.label;
  echoList.innerHTML = '<div class="empty-state" style="padding:16px">Loading…</div>';

  try {
    const echoes = await apiFetch(`/api/motifs/${id}/echoes?limit=30`);
    if (!echoes.length) {
      echoList.innerHTML = '<div class="empty-state">No echoes found.</div>';
      return;
    }
    echoList.innerHTML = echoes.map(e => {
      const color = domainColor(e.domain);
      const dist = e.cosine_distance != null ? (1 - e.cosine_distance).toFixed(3) : '—';
      return `
        <div class="echo-item">
          <div class="echo-domain" style="color:${color}">${e.domain}</div>
          <div class="echo-label">${e.event_label?.replace(/_/g, ' ')}</div>
          <div class="echo-dist">sim ${dist} · ${e.node_name} · ${fmtAge(e.event_start)}</div>
        </div>`;
    }).join('');
  } catch (e) {
    echoList.innerHTML = `<div class="empty-state">⚠ ${e.message}</div>`;
  }

  // trigger particle burst on canvas
  burstResonance(id);
}

function startResonanceCanvas() {
  const cvs = document.getElementById('resonance-canvas');
  const wrap = document.getElementById('resonance-canvas-wrap');
  cvs.width = wrap.offsetWidth;
  cvs.height = wrap.offsetHeight;

  if (resonanceAnimFrame) cancelAnimationFrame(resonanceAnimFrame);
  resonanceParticles = [];
  drawResonance();
}

function burstResonance(motifId) {
  const cvs = document.getElementById('resonance-canvas');
  if (!cvs) return;
  const m = motifs.find(x => x.id === motifId);
  if (!m) return;
  const color = domainColor(m.dominant_domain);
  const cx = cvs.width / 2, cy = cvs.height / 2;
  for (let i = 0; i < 30; i++) {
    const angle = (i / 30) * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    resonanceParticles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      color,
      size: 2 + Math.random() * 3,
    });
  }
}

function drawResonance() {
  const cvs = document.getElementById('resonance-canvas');
  if (!cvs) return;
  const ctx = cvs.getContext('2d');
  ctx.clearRect(0, 0, cvs.width, cvs.height);

  const cx = cvs.width / 2, cy = cvs.height / 2;

  // background web: motif nodes
  if (motifs.length) {
    const n = Math.min(motifs.length, 20);
    const positions = motifs.slice(0, n).map((m, i) => {
      const angle = (i / n) * Math.PI * 2 - Math.PI / 2;
      const r = Math.min(cx, cy) * 0.7;
      return {
        x: cx + Math.cos(angle) * r,
        y: cy + Math.sin(angle) * r,
        m,
      };
    });

    // draw connections
    const maxEchoes = Math.max(...motifs.map(m => m.resonance_count));
    for (let i = 0; i < positions.length; i++) {
      for (let j = i + 1; j < positions.length; j++) {
        const a = positions[i], b = positions[j];
        const alpha = 0.04 + (a.m.resonance_count / maxEchoes) * 0.06;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.strokeStyle = domainColor(a.m.dominant_domain);
        ctx.globalAlpha = alpha;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }

    // draw nodes
    for (const pos of positions) {
      const color = domainColor(pos.m.dominant_domain);
      const r = 3 + (pos.m.resonance_count / maxEchoes) * 10;
      const isSelected = selectedMotif?.id === pos.m.id;

      ctx.beginPath();
      ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.globalAlpha = isSelected ? 0.95 : 0.45;
      ctx.fill();

      if (isSelected) {
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, r + 6, 0, Math.PI * 2);
        ctx.strokeStyle = color;
        ctx.globalAlpha = 0.4;
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    }
  }

  // particles
  ctx.globalAlpha = 1;
  for (let i = resonanceParticles.length - 1; i >= 0; i--) {
    const p = resonanceParticles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.96; p.vy *= 0.96;
    p.life -= 0.018;
    if (p.life <= 0) { resonanceParticles.splice(i, 1); continue; }
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life * 0.8;
    ctx.fill();
  }

  ctx.globalAlpha = 1;
  resonanceAnimFrame = requestAnimationFrame(drawResonance);
}


// ════════════════════════════════════════════════════════════════════════════
// API FETCH
// ════════════════════════════════════════════════════════════════════════════

async function apiFetch(url, opts = {}) {
  const res = await fetch(url, opts);
  if (!res.ok) {
    let detail = res.statusText;
    try { detail = (await res.json()).detail || detail; } catch (_) {}
    throw new Error(`${res.status}: ${detail}`);
  }
  return res.json();
}
