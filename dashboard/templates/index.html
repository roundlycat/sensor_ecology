<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sensor Ecology — Dashboard</title>
  <meta name="description"
    content="Live perceptual dashboard for the distributed sensor ecology — field view, event stream, and motif resonance." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
  <link rel="stylesheet" href="/static/ecology.css" />
</head>

<body>

  <div id="app">

    <!-- ── TOP BAR ─────────────────────────────────────────────────────────── -->
    <div id="topbar">
      <div class="logo">
        <div class="pulse-dot" id="pulse-dot"></div>
        SENSOR ECOLOGY
      </div>

      <div id="nav">
        <button class="nav-btn active" id="btn-field" onclick="switchView('field')">Field</button>
        <button class="nav-btn" id="btn-stream" onclick="switchView('stream')">Stream</button>
        <button class="nav-btn" id="btn-resonance" onclick="switchView('resonance')">Resonance</button>
        <button class="nav-btn" id="btn-musings" onclick="switchView('musings')">Musings</button>
      </div>

      <div id="vitals">
        <div class="vital" title="Pi5 CPU load">
          <span class="vital-label">CPU</span>
          <span class="vital-val" id="v-cpu">—</span>
        </div>
        <div class="vital" title="Pi5 CPU temperature">
          <span class="vital-label">Temp</span>
          <span class="vital-val" id="v-temp">—</span>
        </div>
        <div class="vital" title="Pi5 power draw">
          <span class="vital-label">Power</span>
          <span class="vital-val" id="v-power">—</span>
        </div>
        <div style="width:1px;height:20px;background:var(--border);margin:0 4px"></div>
        <div class="vital">
          <span class="vital-label">Nodes</span>
          <span class="vital-val" id="v-nodes">—</span>
        </div>
        <div class="vital">
          <span class="vital-label">Events/hr</span>
          <span class="vital-val" id="v-rate">—</span>
        </div>
        <div class="vital">
          <span class="vital-label">Total</span>
          <span class="vital-val" id="v-total">—</span>
        </div>
      </div>

      <!-- Narrator trigger -->
      <button id="btn-narrate" onclick="requestNarrative()" style="margin-left:12px;padding:4px 14px;border-radius:7px;
             border:1px solid var(--border);background:none;
             color:var(--text-dim);font-family:var(--font);font-size:11px;
             cursor:pointer;transition:all 0.2s;white-space:nowrap"
        title="Ask Ollama to narrate what the ecology is experiencing">
        ∿ Narrate
      </button>
    </div>

    <!-- ── VIEWS ──────────────────────────────────────────────────────────── -->
    <div id="views">

      <!-- ╔══ FIELD VIEW ═══════════════════════════════════════════════════╗ -->
      <div class="view active" id="view-field">
        <canvas id="field-canvas"></canvas>
        <div id="field-overlay">

          <div id="domain-rings-legend"></div>

          <div id="field-center-text">
            <div id="field-agent"></div>
            <div id="field-summary"></div>
            <div id="field-motif"></div>

            <!-- Ollama narrator output -->
            <div id="field-narrator" style="
            max-width:520px;text-align:center;
            font-size:14px;font-weight:300;line-height:1.75;
            color:var(--text-mid);margin-top:16px;
            opacity:0;transition:opacity 2s ease;
            font-style:italic;letter-spacing:0.01em;
          "></div>
            <div id="narrator-status" style="
            font-size:9px;color:var(--text-dim);margin-top:6px;
            letter-spacing:0.08em;opacity:0;transition:opacity 0.5s;
          "></div>
          </div>

          <div id="field-nodes" style="
            display:flex;flex-wrap:wrap;gap:5px;justify-content:center;
            padding:0 12px 10px;
          "></div>

          <div id="field-bottom">
            <div class="field-stat">
              <div class="field-stat-label">Events today</div>
              <div class="field-stat-val" id="fs-today">—</div>
              <div class="field-stat-sub" id="fs-last-hour">— last hour</div>
            </div>
            <div class="field-stat" style="text-align:center">
              <div class="field-stat-label">Last 5 min</div>
              <div class="field-stat-val" id="fs-5min">—</div>
            </div>
            <div class="field-stat" style="text-align:right">
              <div class="field-stat-label">Motif</div>
              <div class="field-stat-val" style="font-size:13px;font-weight:400;font-family:var(--font)" id="fs-motif">—
              </div>
              <div class="field-stat-sub" id="fs-motif-age"></div>
            </div>
          </div>

        </div>
      </div>

      <!-- ╔══ STREAM VIEW ══════════════════════════════════════════════════╗ -->
      <div class="view" id="view-stream">
        <div id="stream-header">
          <input id="stream-filter" type="text" placeholder="Filter by label, domain, or node…"
            oninput="filterStream()" />
          <button class="filter-chip active" id="chip-all" onclick="setDomainFilter(null)">All</button>
          <button class="filter-chip" id="chip-env" onclick="setDomainFilter('env')">env</button>
          <button class="filter-chip" id="chip-emb" onclick="setDomainFilter('emb')">emb</button>
          <button class="filter-chip" id="chip-rel" onclick="setDomainFilter('rel')">rel</button>
          <button class="filter-chip" id="chip-hi" onclick="setDomainFilter('hi')">hi</button>
          <button class="filter-chip" id="chip-bme" onclick="setDomainFilter('bme')">bme</button>
          <span style="margin-left:auto;font-size:10px;color:var(--text-dim)" id="stream-count"></span>
        </div>
        <div id="stream-feed"></div>
      </div>

      <!-- ╔══ MUSINGS VIEW ════════════════════════════════════════════════╗ -->
      <div class="view" id="view-musings">
        <div id="musings-container" style="
          max-width: 680px;
          margin: 0 auto;
          padding: 40px 24px;
          height: 100%;
          overflow-y: auto;
        ">
          <div id="musings-nav" style="
            display: flex;
            gap: 8px;
            margin-bottom: 32px;
            flex-wrap: wrap;
          "></div>
          <div id="musings-content" style="
            font-family: var(--font);
            font-size: 15px;
            font-weight: 300;
            line-height: 1.85;
            color: var(--text-mid);
            letter-spacing: 0.01em;
          ">
            <div class="empty-state">Loading musings…</div>
          </div>
        </div>
      </div>

      <!-- ╔══ RESONANCE VIEW ═══════════════════════════════════════════════╗ -->
      <div class="view" id="view-resonance">
        <div id="motif-list">
          <div
            style="padding:10px 16px;font-size:9px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-dim)">
            Active Motifs
          </div>
          <div id="motif-cards">
            <div class="empty-state" style="padding:20px">Loading…</div>
          </div>
        </div>

        <div id="resonance-canvas-wrap">
          <canvas id="resonance-canvas"></canvas>
          <div id="echo-panel">
            <div id="echo-title">Echoes</div>
            <div id="echo-list"></div>
          </div>
        </div>
      </div>

      <!-- ╔══ MUSINGS VIEW ═════════════════════════════════════════════════╗ -->
      <div class="view" id="view-musings">
        <div id="musing-container">
          <div class="empty-state">Loading musings...</div>
        </div>
      </div>

    </div>
  </div>

  <div id="toast"></div>

  <script>

    // ── Domain metadata ───────────────────────────────────────────────────────────
    const DOMAINS = {
      env: { color: '#4f9cf9', label: 'Environmental' },
      emb: { color: '#f59f47', label: 'Embodied' },
      rel: { color: '#f05b5b', label: 'Relational' },
      hi: { color: '#a78bfa', label: 'Higher-order' },
      bme: { color: '#38d9a9', label: 'BME280' },
    };
    function domainColor(d) { return DOMAINS[d]?.color || '#8896b3'; }

    // ── View switching ────────────────────────────────────────────────────────────
    const urlParams = new URLSearchParams(window.location.search);
    let currentView = urlParams.get('view') || 'field';
    const isKiosk = urlParams.has('kiosk');
    if (isKiosk) document.body.classList.add('kiosk');

    function switchView(v) {
      document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
      document.getElementById('view-' + v).classList.add('active');
      document.getElementById('btn-' + v).classList.add('active');
      currentView = v;
      if (v === 'resonance') loadMotifs();
      if (v === 'stream') ensureStreamStarted();
      if (v === 'field') resizeFieldCanvas();
      if (v === 'musings') loadMusings();
    }

    // ── Toast ─────────────────────────────────────────────────────────────────────
    let _toastTimer;
    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
    }

    // ── Time helpers ──────────────────────────────────────────────────────────────
    function fmtAge(isoStr) {
      if (!isoStr) return '—';
      const s = Math.floor((Date.now() - new Date(isoStr).getTime()) / 1000);
      if (s < 60) return s + 's ago';
      const m = Math.floor(s / 60);
      if (m < 60) return m + 'm ago';
      const h = Math.floor(m / 60);
      if (h < 24) return h + 'h ago';
      return Math.floor(h / 24) + 'd ago';
    }
    function fmtTime(isoStr) {
      if (!isoStr) return '—';
      return new Date(isoStr).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    // ── API helper ────────────────────────────────────────────────────────────────
    async function apiFetch(url, opts = {}) {
      const res = await fetch(url, opts);
      if (!res.ok) {
        let detail = res.statusText;
        try { detail = (await res.json()).detail || detail; } catch (_) { }
        throw new Error(`${res.status}: ${detail}`);
      }
      return res.json();
    }


    // ════════════════════════════════════════════════════════════════════════════
    // FIELD VIEW
    // ════════════════════════════════════════════════════════════════════════════
    let ecologyState = null;
    let fieldParticles = [];
    let fieldRings = [];
    let hiddenDomains = new Set();

    function resizeFieldCanvas() {
      const cvs = document.getElementById('field-canvas');
      cvs.width = cvs.offsetWidth;
      cvs.height = cvs.offsetHeight;
      buildFieldRings();
    }

    function buildFieldRings() {
      if (!ecologyState) return;
      const cvs = document.getElementById('field-canvas');
      const cx = cvs.width / 2, cy = cvs.height / 2;
      const base = Math.min(cx, cy) * 0.55;
      fieldRings = Object.keys(DOMAINS).map((d, i) => ({
        domain: d, r: base * (1 - i * 0.13), cx, cy,
        color: domainColor(d), angle: 0,
        latest: ecologyState.domain_latest.find(x => x.domain === d),
      }));
    }

    function spawnParticle(domain, cx, cy, r) {
      const a = Math.random() * Math.PI * 2;
      const sp = 0.3 + Math.random() * 0.5;
      fieldParticles.push({
        x: cx + Math.cos(a) * r, y: cy + Math.sin(a) * r,
        vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        life: 1, color: domainColor(domain), size: 1.5 + Math.random() * 2,
      });
      if (fieldParticles.length > 120) fieldParticles.shift();
    }

    function drawField() {
      const cvs = document.getElementById('field-canvas');
      if (!cvs) return;
      const ctx = cvs.getContext('2d');
      ctx.clearRect(0, 0, cvs.width, cvs.height);

      if (ecologyState) {
        const cx = cvs.width / 2, cy = cvs.height / 2;
        for (const ring of fieldRings) {
          if (hiddenDomains.has(ring.domain)) continue;
          ring.angle += 0.002;
          const alpha = ring.latest ? 0.18 : 0.06;
          ctx.beginPath(); ctx.arc(ring.cx, ring.cy, ring.r, 0, Math.PI * 2);
          ctx.strokeStyle = ring.color; ctx.globalAlpha = alpha;
          ctx.lineWidth = 1; ctx.stroke();
          if (ring.latest) {
            ctx.beginPath(); ctx.arc(ring.cx, ring.cy, ring.r, 0, Math.PI * 2);
            ctx.globalAlpha = 0.06; ctx.lineWidth = 8; ctx.stroke();
            const dx = ring.cx + Math.cos(ring.angle) * ring.r;
            const dy = ring.cy + Math.sin(ring.angle) * ring.r;
            ctx.beginPath(); ctx.arc(dx, dy, 4, 0, Math.PI * 2);
            ctx.fillStyle = ring.color; ctx.globalAlpha = 0.9; ctx.fill();
          }
        }
        ctx.globalAlpha = 1;
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 80);
        grad.addColorStop(0, 'rgba(79,156,249,0.08)'); grad.addColorStop(1, 'rgba(79,156,249,0)');
        ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(cx, cy, 80, 0, Math.PI * 2); ctx.fill();
      }

      ctx.globalAlpha = 1;
      for (let i = fieldParticles.length - 1; i >= 0; i--) {
        const p = fieldParticles[i];
        p.x += p.vx; p.y += p.vy; p.vx *= 0.97; p.vy *= 0.97; p.life -= 0.015;
        if (p.life <= 0) { fieldParticles.splice(i, 1); continue; }
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = p.color; ctx.globalAlpha = p.life * 0.7; ctx.fill();
      }
      ctx.globalAlpha = 1;
      requestAnimationFrame(drawField);
    }

    async function loadFieldState() {
      try {
        const state = await apiFetch('/api/stats/ecology');
        ecologyState = state;
        buildFieldRings();
        updateFieldUI(state);
        const cvs = document.getElementById('field-canvas');
        const cx = cvs.width / 2, cy = cvs.height / 2;
        for (const ring of fieldRings) if (ring.latest) spawnParticle(ring.domain, cx, cy, ring.r);
      } catch (e) { console.warn('ecology state:', e.message); }
    }

    function updateFieldUI(state) {
      const v = state.vitals;
      if (v) {
        const temp = v.agent_temp_c?.toFixed(1);
        const el = document.getElementById('v-temp');
        el.textContent = temp ? temp + '°C' : '—';
        el.className = 'vital-val' + (temp > 70 ? ' hot' : temp > 55 ? ' warm' : '');
        document.getElementById('v-cpu').textContent =
          v.agent_cpu_load_pct != null ? v.agent_cpu_load_pct.toFixed(0) + '%' : '—';
        document.getElementById('v-power').textContent =
          v.agent_power_mw != null ? (v.agent_power_mw / 1000).toFixed(1) + 'W' : '—';
      }
      if (state.totals) {
        document.getElementById('v-rate').textContent = state.totals.last_hour ?? '—';
        document.getElementById('v-total').textContent = state.totals.today ?? '—';
        document.getElementById('fs-today').textContent = state.totals.today ?? '—';
        document.getElementById('fs-last-hour').textContent = (state.totals.last_hour ?? '—') + ' last hour';
        document.getElementById('fs-5min').textContent = state.totals.last_5min ?? '—';
      }
      if (state.active_nodes) {
        const activeCount = state.active_nodes.filter(n => n.event_count_1h > 0).length;
        document.getElementById('v-nodes').textContent =
          activeCount + '/' + state.active_nodes.length;
      }
      const lr = state.latest_resonance;
      if (lr) {
        document.getElementById('fs-motif').textContent = lr.label ? lr.label.slice(0, 40) : '—';
        document.getElementById('fs-motif-age').textContent = fmtAge(lr.observed_at);
      }

      const legend = document.getElementById('domain-rings-legend');
      legend.innerHTML = Object.entries(DOMAINS).map(([key, meta]) => {
        const latest = state.domain_latest.find(x => x.domain === key);
        const hidden = hiddenDomains.has(key);
        const nodeName = latest?.node_name || '';
        const shortNode = nodeName.length > 12 ? nodeName.slice(0, 11) + '…' : nodeName;
        return `<div class="domain-chip ${hidden ? 'dim' : ''}" style="border-color:${meta.color}22"
         id="chip-domain-${key}" onclick="toggleDomain('${key}')">
      <div class="dot" style="background:${meta.color}${latest ? 'ff' : '44'}"></div>
      <span style="color:${latest ? 'var(--text)' : 'var(--text-dim)'}">${key}</span>
      ${latest ? `<span class="count" style="color:var(--text-dim);font-size:8px;margin-right:2px" title="${nodeName}">${shortNode}</span>` : ''}
      ${latest ? `<span class="count">${fmtAge(latest.event_start)}</span>` : ''}
    </div>`;
      }).join('');

      const sorted = [...state.domain_latest].sort((a, b) => new Date(b.event_start) - new Date(a.event_start));
      if (sorted.length) {
        const top = sorted[0];
        const summaryEl = document.getElementById('field-summary');
        summaryEl.textContent = top.event_label?.replace(/_/g, ' ') || '';
        summaryEl.classList.add('visible');
        const nodePart = top.node_name ? ' · ' + top.node_name : '';
        document.getElementById('field-agent').textContent =
          (top.domain?.toUpperCase() || '') + nodePart + ' · ' + fmtAge(top.event_start);
        const motifEl = document.getElementById('field-motif');
        motifEl.textContent = lr?.label || '';
        motifEl.classList.toggle('visible', !!lr?.label);
      }

      // Active nodes strip
      const nodesEl = document.getElementById('field-nodes');
      if (nodesEl && state.active_nodes?.length) {
        nodesEl.innerHTML = state.active_nodes.map(n => {
          const age = fmtAge(n.last_event);
          const hot = n.event_count_1h > 0;
          const domColor = domainColor(n.primary_domain);
          return `<span style="
            display:inline-flex;align-items:center;gap:4px;
            padding:2px 7px;border-radius:3px;
            border:1px solid ${domColor}${hot ? '55' : '22'};
            color:${hot ? 'var(--text)' : 'var(--text-dim)'};
            font-size:9px;letter-spacing:0.04em;white-space:nowrap
          " title="${n.event_count_24h} events today · ${n.event_count_1h} last hour">
            <span style="width:5px;height:5px;border-radius:50%;background:${domColor}${hot ? 'ff' : '55'};flex-shrink:0"></span>
            ${n.node_name}
            <span style="color:var(--text-dim)">${age}</span>
          </span>`;
        }).join('');
      }
      document.getElementById('pulse-dot').classList.toggle('dim',
        !state.domain_latest.some(x => new Date(x.event_start) > Date.now() - 300_000));
    }

    function toggleDomain(key) {
      if (hiddenDomains.has(key)) hiddenDomains.delete(key);
      else hiddenDomains.add(key);
      document.getElementById('chip-domain-' + key)?.classList.toggle('dim');
    }


    // ════════════════════════════════════════════════════════════════════════════
    // NARRATOR
    // ════════════════════════════════════════════════════════════════════════════
    let _narratorPollInterval = null;

    async function fetchNarrativeState() {
      try {
        const data = await apiFetch('/api/corpus/narrative');
        const textEl = document.getElementById('field-narrator');
        const statusEl = document.getElementById('narrator-status');
        if (data.is_running) {
          statusEl.textContent = '∿ composing…';
          statusEl.style.opacity = '1';
          return false;
        }
        if (data.text) {
          textEl.textContent = data.text;
          textEl.style.opacity = '1';
          const age = data.generated_at
            ? fmtAge(new Date(data.generated_at * 1000).toISOString()) : '';
          statusEl.textContent = `${data.model || 'ollama'} · ${age}`;
          statusEl.style.opacity = '0.6';
        }
        const btn = document.getElementById('btn-narrate');
        btn.textContent = '∿ Narrate';
        btn.style.color = 'var(--text-dim)';
        btn.disabled = false;
        return true;
      } catch (e) { console.warn('narrator poll:', e.message); return true; }
    }

    async function requestNarrative() {
      const btn = document.getElementById('btn-narrate');
      const statusEl = document.getElementById('narrator-status');
      btn.textContent = '∿ composing…';
      btn.style.color = '#38d9a9';
      btn.disabled = true;
      statusEl.textContent = '∿ composing…';
      statusEl.style.opacity = '1';
      try {
        await apiFetch('/api/corpus/narrative/force', { method: 'POST' });
      } catch (e) {
        statusEl.textContent = '⚠ Ollama unavailable';
        btn.textContent = '∿ Narrate';
        btn.style.color = 'var(--text-dim)';
        btn.disabled = false;
        return;
      }
      clearInterval(_narratorPollInterval);
      _narratorPollInterval = setInterval(async () => {
        const done = await fetchNarrativeState();
        if (done) clearInterval(_narratorPollInterval);
      }, 2000);
    }

    async function initNarrator() {
      await fetchNarrativeState();
      setInterval(fetchNarrativeState, 300_000);
    }


    // ════════════════════════════════════════════════════════════════════════════
    // STREAM VIEW
    // ════════════════════════════════════════════════════════════════════════════
    let streamStarted = false;
    let streamDomainFilter = null;
    let streamEvents = [];
    const MAX_STREAM = 200;

    function ensureStreamStarted() {
      if (streamStarted) return;
      streamStarted = true;
      loadStreamBatch();
      setInterval(loadStreamBatch, 4000);
    }

    async function loadStreamBatch() {
      try {
        const domain = streamDomainFilter ? `&domain=${streamDomainFilter}` : '';
        const events = await apiFetch(`/api/stats/events?limit=30${domain}`);
        if (!events.length) return;
        const existingIds = new Set(streamEvents.map(e => e.id));
        const newEvs = events.filter(e => !existingIds.has(e.id));
        if (!newEvs.length) return;
        streamEvents = [...newEvs, ...streamEvents].slice(0, MAX_STREAM);
        document.getElementById('stream-count').textContent = streamEvents.length + ' events';
        renderStream();
      } catch (e) { console.warn('stream:', e.message); }
    }

    function setDomainFilter(domain) {
      streamDomainFilter = domain;
      document.querySelectorAll('#stream-header .filter-chip').forEach(el => el.classList.remove('active'));
      document.getElementById(domain ? 'chip-' + domain : 'chip-all')?.classList.add('active');
      streamEvents = [];
      loadStreamBatch();
    }

    function filterStream() { renderStream(); }

    function renderStream() {
      const query = document.getElementById('stream-filter').value.toLowerCase();
      const feed = document.getElementById('stream-feed');
      const filtered = query
        ? streamEvents.filter(e =>
          e.event_label?.toLowerCase().includes(query) ||
          e.domain?.toLowerCase().includes(query) ||
          e.node_name?.toLowerCase().includes(query) ||
          e.nearest_motif_label?.toLowerCase().includes(query))
        : streamEvents;

      feed.innerHTML = filtered.map(e => {
        const color = domainColor(e.domain);
        const conf = e.confidence || 'low';
        const confColor = conf === 'high' ? '#38d9a9' : conf === 'moderate' ? '#f59f47' : '#8896b3';
        const hasCross = e.is_cross_domain && (e.domains_involved?.length || 0) > 1;
        return `
      <div class="event-card" id="ec-${e.id}" onclick="toggleExpand('${e.id}')">
        <div class="event-domain-bar" style="background:${color}"></div>
        <div class="event-body">
          <div class="event-header-row">
            <span class="event-agent">${e.node_name || '—'}</span>
            <span class="event-label">${e.domain}</span>
            <span class="event-confidence" style="color:${confColor};border-color:${confColor}40">${conf}</span>
            ${hasCross ? `<span class="event-confidence" style="color:#a78bfa;border-color:#a78bfa40">cross-domain</span>` : ''}
          </div>
          <div class="event-summary${conf === 'high' ? ' rich' : ''}">
            ${e.event_label?.replace(/_/g, ' ') || '—'}
          </div>
          ${e.nearest_motif_label ? `<div class="event-motif">∿ ${e.nearest_motif_label}</div>` : ''}
          <div class="event-expand">
            <div class="feature-snapshot" id="fs-${e.id}"></div>
            <div id="corpus-${e.id}"></div>
          </div>
        </div>
        <div class="event-time">${fmtAge(e.event_start)}</div>
      </div>`;
      }).join('');
    }

    function toggleExpand(id) {
      const card = document.getElementById('ec-' + id);
      if (!card) return;
      const expanded = card.classList.toggle('expanded');
      if (expanded) {
        const e = streamEvents.find(x => x.id === id);
        const snap = document.getElementById('fs-' + id);
        if (snap && e?.feature_snapshot) {
          try { snap.textContent = JSON.stringify(e.feature_snapshot, null, 2); }
          catch { snap.textContent = String(e.feature_snapshot); }
        }
        loadCorpusEchoes(id);
      }
    }

    async function loadCorpusEchoes(eventId) {
      const container = document.getElementById('corpus-' + eventId);
      if (!container || container.dataset.loaded) return;
      container.dataset.loaded = '1';
      container.innerHTML = `<div style="color:var(--text-dim);font-size:10px;padding:6px 0;font-style:italic">searching archive…</div>`;
      try {
        const data = await apiFetch(`/api/corpus/resonance/${eventId}?limit=4&threshold=0.40`);
        if (!data.corpus_available) { container.innerHTML = ''; return; }
        if (!data.echoes.length) {
          container.innerHTML = `<div style="color:var(--text-dim);font-size:10px;padding:4px 0;font-style:italic">no archive resonance above threshold</div>`;
          return;
        }
        container.innerHTML = `
      <div style="font-size:9px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-dim);margin:10px 0 6px">
        Archive resonance
      </div>
      ${data.echoes.map(e => `
        <div style="border-left:2px solid #a78bfa44;padding:4px 0 4px 10px;margin-bottom:8px">
          <div style="font-size:9px;color:#a78bfa;margin-bottom:3px">
            ${e.source} · ${(e.similarity * 100).toFixed(0)}% similar
          </div>
          <div style="font-size:12px;color:var(--text-mid);line-height:1.55;font-style:italic">
            "${(e.chunk_text || '').slice(0, 240)}${(e.chunk_text || '').length > 240 ? '…' : ''}"
          </div>
        </div>`).join('')}`;
      } catch (e) { container.innerHTML = ''; }
    }


    // ════════════════════════════════════════════════════════════════════════════
    // RESONANCE VIEW
    // ════════════════════════════════════════════════════════════════════════════
    let motifs = [];
    let selectedMotif = null;
    let resonanceParticles = [];

    async function loadMotifs() {
      try {
        motifs = await apiFetch('/api/motifs/active?limit=40');
        renderMotifList();
        startResonanceCanvas();
      } catch (e) {
        document.getElementById('motif-cards').innerHTML = `<div class="empty-state">⚠ ${e.message}</div>`;
      }
    }

    function renderMotifList() {
      if (!motifs.length) {
        document.getElementById('motif-cards').innerHTML = '<div class="empty-state">No motifs with resonance yet.</div>';
        return;
      }
      const maxEchoes = Math.max(...motifs.map(m => m.resonance_count));
      document.getElementById('motif-cards').innerHTML = motifs.map(m => {
        const color = domainColor(m.dominant_domain);
        const pct = maxEchoes > 0 ? (m.resonance_count / maxEchoes * 100).toFixed(0) : 0;
        const isActive = selectedMotif?.id === m.id;
        return `
      <div class="motif-card ${isActive ? 'active' : ''}" id="mc-${m.id}"
           style="${isActive ? 'border-left-color:' + color : ''}"
           onclick="selectMotif('${m.id}')">
        <div class="motif-label">${m.label}</div>
        <div class="motif-meta">
          <div class="motif-domain-dot" style="background:${color}"></div>
          <span class="motif-count">${m.resonance_count} echo${m.resonance_count !== 1 ? 's' : ''}</span>
          <span class="motif-age">${fmtAge(m.last_resonance)}</span>
        </div>
        <div class="motif-bar-wrap">
          <div class="motif-bar" style="width:${pct}%;background:${color}"></div>
        </div>
      </div>`;
      }).join('');
    }

    async function selectMotif(id) {
      selectedMotif = motifs.find(m => m.id === id) || null;
      renderMotifList();
      const panel = document.getElementById('echo-panel');
      const echoList = document.getElementById('echo-list');
      if (!selectedMotif) { panel.classList.remove('open'); return; }
      panel.classList.add('open');
      document.getElementById('echo-title').textContent = selectedMotif.label;
      echoList.innerHTML = '<div class="empty-state" style="padding:16px">Loading…</div>';
      try {
        const echoes = await apiFetch(`/api/motifs/${id}/echoes?limit=30`);
        if (!echoes.length) { echoList.innerHTML = '<div class="empty-state">No echoes found.</div>'; return; }
        echoList.innerHTML = echoes.map(e => {
          const color = domainColor(e.domain);
          const dist = e.cosine_distance != null ? (1 - e.cosine_distance).toFixed(3) : '—';
          return `
        <div class="echo-item">
          <div class="echo-domain" style="color:${color}">${e.domain}</div>
          <div class="echo-label">${e.event_label?.replace(/_/g, ' ')}</div>
          <div class="echo-dist">sim ${dist} · ${e.node_name} · ${fmtAge(e.event_start)}</div>
        </div>`;
        }).join('');
      } catch (e) { echoList.innerHTML = `<div class="empty-state">⚠ ${e.message}</div>`; }
      burstResonance(id);

      // Trigger AR Simulation: when a motif is selected on the Pi5 touchscreen,
      // notify the relay API so the AR client (SimTapReceiver) simulates a 3D node tap.
      try {
        await fetch(`http://${window.location.hostname}:8765/api/sim/tap`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ motif_id: id })
        });
      } catch (e) { console.warn('AR sim tap failed:', e.message); }
    }

    function startResonanceCanvas() {
      const cvs = document.getElementById('resonance-canvas');
      const wrap = document.getElementById('resonance-canvas-wrap');
      cvs.width = wrap.offsetWidth;
      cvs.height = wrap.offsetHeight;
      resonanceParticles = [];
      drawResonance();
    }

    function burstResonance(motifId) {
      const cvs = document.getElementById('resonance-canvas');
      if (!cvs) return;
      const m = motifs.find(x => x.id === motifId);
      if (!m) return;
      const color = domainColor(m.dominant_domain);
      const cx = cvs.width / 2, cy = cvs.height / 2;
      for (let i = 0; i < 30; i++) {
        const a = i / 30 * Math.PI * 2, sp = 1 + Math.random() * 3;
        resonanceParticles.push({
          x: cx, y: cy, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
          life: 1, color, size: 2 + Math.random() * 3
        });
      }
    }

    function drawResonance() {
      const cvs = document.getElementById('resonance-canvas');
      if (!cvs) return;
      const ctx = cvs.getContext('2d');
      ctx.clearRect(0, 0, cvs.width, cvs.height);
      const cx = cvs.width / 2, cy = cvs.height / 2;

      if (motifs.length) {
        const n = Math.min(motifs.length, 20);
        const positions = motifs.slice(0, n).map((m, i) => {
          const a = (i / n) * Math.PI * 2 - Math.PI / 2;
          const r = Math.min(cx, cy) * 0.7;
          return { x: cx + Math.cos(a) * r, y: cy + Math.sin(a) * r, m };
        });
        const maxEchoes = Math.max(...motifs.map(m => m.resonance_count));
        for (let i = 0; i < positions.length; i++)
          for (let j = i + 1; j < positions.length; j++) {
            const a = positions[i], b = positions[j];
            ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
            ctx.strokeStyle = domainColor(a.m.dominant_domain);
            ctx.globalAlpha = 0.04 + (a.m.resonance_count / maxEchoes) * 0.06;
            ctx.lineWidth = 0.5; ctx.stroke();
          }
        for (const pos of positions) {
          const color = domainColor(pos.m.dominant_domain);
          const r = 3 + (pos.m.resonance_count / maxEchoes) * 10;
          const isSel = selectedMotif?.id === pos.m.id;
          ctx.beginPath(); ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
          ctx.fillStyle = color; ctx.globalAlpha = isSel ? 0.95 : 0.45; ctx.fill();
          if (isSel) {
            ctx.beginPath(); ctx.arc(pos.x, pos.y, r + 6, 0, Math.PI * 2);
            ctx.strokeStyle = color; ctx.globalAlpha = 0.4; ctx.lineWidth = 2; ctx.stroke();
          }
        }
      }

      ctx.globalAlpha = 1;
      for (let i = resonanceParticles.length - 1; i >= 0; i--) {
        const p = resonanceParticles[i];
        p.x += p.vx; p.y += p.vy; p.vx *= 0.96; p.vy *= 0.96; p.life -= 0.018;
        if (p.life <= 0) { resonanceParticles.splice(i, 1); continue; }
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = p.color; ctx.globalAlpha = p.life * 0.8; ctx.fill();
      }
      ctx.globalAlpha = 1;
      requestAnimationFrame(drawResonance);
    }



    // ════════════════════════════════════════════════════════════════════════════
    // MUSINGS VIEW
    // ════════════════════════════════════════════════════════════════════════════
    async function loadMusings() {
      const container = document.getElementById('musing-container');
      try {
        const data = await apiFetch('/api/musings');
        if (!data.musings || !data.musings.length) {
          container.innerHTML = '<div class="empty-state">No musings found. Add some text files to the static/musings folder.</div>';
          return;
        }
        container.innerHTML = data.musings.map((m, i) => `
          <div class="musing-card" style="animation-delay: ${i * 0.1}s">
            <div class="musing-title">${m.title}</div>
            <div class="musing-meta">AI Reflection · ${fmtAge(new Date(m.created_at * 1000).toISOString())}</div>
            <div class="musing-body">${m.content.split('\\n').filter(p => p.trim()).map(p => '<p>' + p + '</p>').join('')}</div>
          </div>
        `).join('');
      } catch (e) {
        container.innerHTML = '<div class="empty-state">Failed to load musings: ' + e.message + '</div>';
      }
    }


    // ════════════════════════════════════════════════════════════════════════════
    // INIT
    // ════════════════════════════════════════════════════════════════════════════
    window.addEventListener('resize', () => {
      if (currentView === 'field') resizeFieldCanvas();
      if (currentView === 'resonance') startResonanceCanvas();
    });

    resizeFieldCanvas();
    requestAnimationFrame(drawField);
    loadFieldState();
    setInterval(loadFieldState, 10_000);
    initNarrator();
    switchView(currentView);


    // ════════════════════════════════════════════════════════════════════════════
    // MUSINGS VIEW
    // ════════════════════════════════════════════════════════════════════════════
    let musingsData = [];
    let currentMusingIndex = 0;

    function renderMarkdown(text) {
      // Minimal markdown: headers, bold, italic, paragraphs
      return text
        .replace(/^# (.+)$/gm, '<h2 style="font-size:18px;font-weight:500;color:var(--text);margin:0 0 6px">$1</h2>')
        .replace(/^## (.+)$/gm, '<h3 style="font-size:14px;font-weight:500;color:var(--text);margin:20px 0 4px">$1</h3>')
        .replace(/\*\*(.+?)\*\*/g, '<strong style="color:var(--text)">$1</strong>')
        .replace(/\*([^*]+)\*/g, '<em style="color:var(--text-mid)">$1</em>')
        .replace(/^---$/gm, '<hr style="border:none;border-top:1px solid var(--border);margin:20px 0">')
        .replace(/\n\n/g, '</p><p style="margin:0 0 16px">')
        .replace(/^/, '<p style="margin:0 0 16px">')
        .replace(/$/, '</p>');
    }

    function showMusing(index) {
      const m = musingsData[index];
      if (!m) return;
      currentMusingIndex = index;

      // Update nav pill states
      document.querySelectorAll('.musing-pill').forEach((el, i) => {
        el.style.opacity = i === index ? '1' : '0.4';
        el.style.borderColor = i === index ? 'var(--text-dim)' : 'transparent';
      });

      const contentEl = document.getElementById('musings-content');
      contentEl.style.opacity = '0';
      setTimeout(() => {
        contentEl.innerHTML = renderMarkdown(m.content);
        contentEl.style.transition = 'opacity 1.2s ease';
        contentEl.style.opacity = '1';
      }, 300);
    }

    async function loadMusings() {
      try {
        const data = await apiFetch('/api/musings/');
        musingsData = data.musings || [];
        if (!musingsData.length) {
          document.getElementById('musings-content').innerHTML =
            '<div class="empty-state">No musings yet.</div>';
          return;
        }

        // Build nav pills
        const navEl = document.getElementById('musings-nav');
        navEl.innerHTML = musingsData.map((m, i) => `
          <button class="musing-pill" onclick="showMusing(${i})" style="
            background: none;
            border: 1px solid transparent;
            border-radius: 4px;
            padding: 3px 10px;
            font-family: var(--font);
            font-size: 10px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
          ">${m.title}</button>
        `).join('');

        showMusing(0);
      } catch(e) {
        document.getElementById('musings-content').innerHTML =
          `<div class="empty-state">⚠ ${e.message}</div>`;
      }
    }

  </script>
</body>
