{% extends "base.html" %}
{% block title %}Observations{% endblock %}

{% block content %}
<h1 class="page-title">Observations</h1>

<div class="filter-bar">
  <label>
    Agent Type
    <select id="filter-agent-type">
      <option value="">All</option>
    </select>
  </label>
  <label>
    Observation Type
    <select id="filter-obs-type">
      <option value="">All</option>
    </select>
  </label>
  <label>
    Since
    <input type="text" id="filter-since"
           placeholder="e.g. 2024-01-01T00:00:00"
           style="width:190px" />
  </label>
  <label>
    Limit
    <select id="filter-limit">
      <option value="50">50</option>
      <option value="100">100</option>
      <option value="200">200</option>
    </select>
  </label>
  <button onclick="loadObservations()">Apply</button>
  <button class="secondary" onclick="clearFilters()">Clear</button>
</div>

<div id="obs-table"><div class="loading">Loading…</div></div>
{% endblock %}

{% block scripts %}
<script>
async function initFilters() {
  const [agentTypes, obsTypes] = await Promise.all([
    apiFetch('/api/agents/meta/types'),
    apiFetch('/api/observations/meta/types'),
  ]);

  const atSel = document.getElementById('filter-agent-type');
  agentTypes.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t; opt.textContent = t;
    atSel.appendChild(opt);
  });

  const otSel = document.getElementById('filter-obs-type');
  obsTypes.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t; opt.textContent = t;
    otSel.appendChild(opt);
  });
}

async function loadObservations() {
  const el = document.getElementById('obs-table');
  UI.loading(el);

  const params = new URLSearchParams();
  const agentType  = document.getElementById('filter-agent-type').value;
  const obsType    = document.getElementById('filter-obs-type').value;
  const since      = document.getElementById('filter-since').value;
  const limit      = document.getElementById('filter-limit').value;

  if (agentType) params.set('agent_type', agentType);
  if (obsType)   params.set('observation_type', obsType);
  if (since)     params.set('since', since);
  params.set('limit', limit);

  try {
    const obs = await apiFetch(`/api/observations/recent?${params}`);
    if (!obs.length) {
      UI.empty(el, 'No observations match these filters.');
      return;
    }
    el.innerHTML = `
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Time</th>
              <th>Agent</th>
              <th>Type</th>
              <th>Confidence</th>
              <th>Summary</th>
            </tr>
          </thead>
          <tbody>
            ${obs.map(o => `
              <tr>
                <td class="muted small" style="white-space:nowrap">
                  ${UI.formatTime(o.observed_at)}
                </td>
                <td>
                  <span class="badge">${o.agent_name}</span><br>
                  <span class="muted small">${o.agent_type}</span>
                </td>
                <td>${UI.typeBadge(o.observation_type)}</td>
                <td style="min-width:130px">${UI.confBar(o.confidence)}</td>
                <td>${o.semantic_summary}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>`;
  } catch (e) {
    UI.error(el, e.message);
  }
}

function clearFilters() {
  document.getElementById('filter-agent-type').value = '';
  document.getElementById('filter-obs-type').value   = '';
  document.getElementById('filter-since').value      = '';
  document.getElementById('filter-limit').value      = '50';
  loadObservations();
}

initFilters().then(() => loadObservations()).catch(console.error);
</script>
{% endblock %}
