; Slow-Growth Acoustic Listener — PlatformIO build configuration
; Target: Freenove ESP32-S3 WROOM (ESP32-S3-WROOM-1 module)
; USB: native CDC via ttyACM0

[env:freenove_esp32_s3_wroom]
platform  = espressif32
board     = freenove_esp32_s3_wroom
framework = arduino

upload_port   = /dev/ttyACM0
monitor_port  = /dev/ttyACM0
monitor_speed = 115200

; CDC flags must be explicitly set even though the board JSON defines them —
; the board default may set them to 0. These force USB Serial → ttyACM0.
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=0
    -DCONFIG_ARDUHAL_LOG_COLORS=0
    ; Suppress legacy I2S driver deprecation warnings on IDF 5.x
    -Wno-deprecated-declarations

lib_deps =
    olikraus/U8g2 @ ^2.35.7
    bblanchon/ArduinoJson @ ^7.0.0
