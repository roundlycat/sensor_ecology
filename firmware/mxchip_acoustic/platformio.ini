[env:mxchip_az3166]
platform  = ststm32
board     = mxchip_az3166
framework = arduino

; Pin toolchain to the locally-installed version (avoids re-download)
platform_packages =
    toolchain-gccarmnoneeabi @ ~1.140201.0

monitor_speed = 115200
upload_speed  = 115200

build_flags =
    -D MQTT_BROKER_IP='"192.168.0.25"'
    -D MQTT_BROKER_PORT=1883
    -Wno-deprecated-declarations
    ; Fix A-pre: Force-include stdint.h and the real toolchain strings.h before
    ; any Azure SDK code runs. stdint.h provides uint32_t etc. for framework
    ; headers that forget to include it (e.g., SystemVersion.h). strings.h
    ; pre-declares strcasecmp/strncasecmp which framework code (http_parse.c)
    ; needs, and which are no longer auto-included via string.h:24 once
    ; __BSD_VISIBLE=0 (Fix A). Absolute path bypasses Azure's strings.h.
    -include /home/sean/.platformio/packages/toolchain-gccarmnoneeabi/arm-none-eabi/include/stdint.h
    -include /home/sean/.platformio/packages/toolchain-gccarmnoneeabi/arm-none-eabi/include/strings.h
    ;
    ; Fix A: GCC 14 + MXChip Azure SDK circular-include bug.
    ; string.h:24 includes <strings.h> (BSD visible) which finds Azure's
    ; strings.h, which pulls in macro_utils.h → <cstring>, while string.h's
    ; guard is already set, so "using ::memchr" etc. fail.
    ; _XOPEN_SOURCE=600 prevents sys/features.h from setting _DEFAULT_SOURCE
    ; (the !defined(_XOPEN_SOURCE) condition in the BSD enable block is false),
    ; keeping __BSD_VISIBLE=0. But XSI visibility is >= 600, which DOES declare
    ; isascii/toascii and strcasecmp — all used by framework code (WCharacter.cpp
    ; and pgmspace.cpp). Unlike _POSIX_C_SOURCE=200809L, this doesn't trigger
    ; extra POSIX socket headers that conflict with lwIP's fd_set.
    -D_XOPEN_SOURCE=600
    ;
    ; Fix B: fd_set conflict introduced by Fix A.
    ; With POSIX mode, sys/select.h is pulled in and redefines fd_set after
    ; LwIP already defined it (guarded only by #ifndef FD_SET, which LwIP set).
    ; Pre-define _SYS_SELECT_H to suppress sys/select.h entirely.
    ; The firmware uses LwIP's lwip_select(), not POSIX select(), so this is safe.
    -D_SYS_SELECT_H

; Arduino/mxchip framework includes AudioV2, OledDisplay, EEPROMInterface,
; WiFi and MQTT libraries from the ststm32mxchip framework package.
