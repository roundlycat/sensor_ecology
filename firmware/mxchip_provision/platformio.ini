; MXChip AZ3166 — WiFi credential provisioning
; Flash this once to write credentials into the EMW3166 module's persistent flash.
; Then flash mxchip_acoustic as normal — SystemWiFiConnect() will use them.

[env:mxchip_az3166]
platform  = ststm32
board     = mxchip_az3166
framework = arduino

platform_packages =
    toolchain-gccarmnoneeabi @ ~1.140201.0

monitor_speed = 115200
upload_speed  = 115200

build_flags =
    -D MQTT_BROKER_IP='"192.168.0.25"'
    -D MQTT_BROKER_PORT=1883
    -Wno-deprecated-declarations
    -include /home/sean/.platformio/packages/toolchain-gccarmnoneeabi/arm-none-eabi/include/stdint.h
    -include /home/sean/.platformio/packages/toolchain-gccarmnoneeabi/arm-none-eabi/include/strings.h
    -D_XOPEN_SOURCE=600
    -D_SYS_SELECT_H
